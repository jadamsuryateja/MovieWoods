<!doctype html>
<html lang="en" class="antialiased">

<head>
  <meta charset="UTF-8" />

  <!-- Viewport Configuration -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />

  <!-- Primary Meta Tags -->
  <title>Dreamswood | Award-Winning Visual Effects & Post-Production Studio</title>
  <meta name="title" content="Dreamswood | Award-Winning Visual Effects & Post-Production Studio" />
  <meta name="description"
    content="Dreamswood is a world-class visual effects and animation studio delivering groundbreaking VFX, CGI, and immersive experiences for global film, TV, and advertising. Specializing in high-end compositing, creature animation, and virtual production." />
  <meta name="keywords"
    content="Visual Effects, VFX Studio, CGI, 3D Animation, Motion Design, Color Grading, Post Production, Virtual Production, Houdini VFX, Nuke Compositing, Unreal Engine, Creature Animation, Film Production, Commercial VFX, Digital Environments, Matte Painting, Fluid Simulation" />
  <meta name="author" content="Dreamswood Studio" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

  <!-- Security & Performance Policies -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <!-- Basic CSP to prevent common XSS while allowing standard React/Vite dev behavior -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:;" />

  <!-- Aggressive Preloading for Critical Assets -->
  <!-- Note: Update href with exact font file if hosted locally -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
    as="style" />

  <!-- Preconnect & DNS Prefetch for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://dreamswood.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dreamswood.com/" />
  <meta property="og:title" content="Dreamswood | World-Class Visual Effects & Animation Studio" />
  <meta property="og:description"
    content="Pushing the boundaries of visual storytelling through high-end VFX, CGI, and virtual production. See our award-winning work." />
  <meta property="og:image" content="/assets/favicon.png" />
  <meta property="og:site_name" content="Dreamswood" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://dreamswood.com/" />
  <meta property="twitter:title" content="Dreamswood | World-Class Visual Effects & Animation Studio" />
  <meta property="twitter:description"
    content="Pushing the boundaries of visual storytelling through high-end VFX, CGI, and virtual production." />
  <meta property="twitter:image" content="/assets/favicon.png" />
  <meta name="twitter:creator" content="@Dreamswood" />

  <!-- Apple Touch & PWA specific -->
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Dreamswood" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="shortcut icon" href="/assets/favicon.png" />

  <!-- Schema.org JSON-LD Structured Data for Rich Search Results -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Dreamswood",
      "alternateName": "Dreamswood Studio",
      "image": "/assets/favicon.png",
      "url": "https://dreamswood.com",
      "telephone": "+18005550199",
      "priceRange": "$$$",
      "description": "Dreamswood is an award-winning visual effects and animation studio specializing in high-end CGI, motion design, and virtual production for film and advertising.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Creative Studio Blvd",
        "addressLocality": "Los Angeles",
        "addressRegion": "CA",
        "postalCode": "90028",
        "addressCountry": "US"
      },
      "knowsAbout": [
        "Visual Effects",
        "CGI",
        "3D Animation",
        "Virtual Production",
        "Houdini",
        "Nuke",
        "Unreal Engine",
        "Creature Animation",
        "Digital Environments"
      ],
      "sameAs": [
        "https://twitter.com/dreamswood",
        "https://www.linkedin.com/company/dreamswood",
        "https://www.instagram.com/dreamswood"
      ]
    }
  </script>
</head>

  <div id="root"></div>
