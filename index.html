<!doctype html>
<html lang="en" class="antialiased">

<head>
  <meta charset="UTF-8" />

  <!-- Viewport Configuration -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />

  <!-- Primary Meta Tags -->
  <title>MovieWoods — Premium Visual Effects & Post-Production Studio</title>
  <meta name="title" content="MovieWoods — Premium Visual Effects & Post-Production Studio" />
  <meta name="description"
    content="MovieWoods is a world-class visual effects, motion design, and post-production studio specializing in commercials, film, TV, and music videos." />
  <meta name="keywords"
    content="Visual Effects, VFX Studio, Motion Design, Color Grading, Sound Design, Post Production, Film, Commercials" />
  <meta name="author" content="MovieWoods Studio" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

  <!-- Security & Performance Policies -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <!-- Basic CSP to prevent common XSS while allowing standard React/Vite dev behavior -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:;" />

  <!-- Aggressive Preloading for Critical Assets -->
  <!-- Note: Update href with exact font file if hosted locally -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
    as="style" />

  <!-- Preconnect & DNS Prefetch for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://moviewoods.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://moviewoods.com/" />
  <meta property="og:title" content="MovieWoods — Premium Visual Effects Studio" />
  <meta property="og:description"
    content="World-class visual effects, motion design, and post-production studio. Elevating visual storytelling." />
  <meta property="og:image" content="https://moviewoods.com/og-image.jpg" />
  <meta property="og:site_name" content="MovieWoods" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://moviewoods.com/" />
  <meta property="twitter:title" content="MovieWoods — Premium Visual Effects Studio" />
  <meta property="twitter:description"
    content="World-class visual effects, motion design, and post-production studio. Elevating visual storytelling." />
  <meta property="twitter:image" content="https://moviewoods.com/og-image.jpg" />
  <meta name="twitter:creator" content="@MovieWoods" />

  <!-- Apple Touch & PWA specific -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MovieWoods" />

  <!-- Icons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

  <!-- Schema.org JSON-LD Structured Data for Rich Search Results -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "MovieWoods",
      "image": "https://moviewoods.com/og-image.jpg",
      "url": "https://moviewoods.com",
      "telephone": "+18005550199",
      "priceRange": "$$$",
      "description": "World-class visual effects, motion design, and post-production studio specializing in commercials, film, TV, and music videos.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Creative Studio Blvd",
        "addressLocality": "Los Angeles",
        "addressRegion": "CA",
        "postalCode": "90028",
        "addressCountry": "US"
      },
      "sameAs": [
        "https://twitter.com/moviewoods",
        "https://www.linkedin.com/company/moviewoods",
        "https://www.instagram.com/moviewoods"
      ]
    }
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
